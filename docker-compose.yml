version: '3.8'

services:
  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    container_name: gestion-inasistencias-n8n
    restart: always
    ports:
      - "5678:5678"
    volumes:
      - n8n_data_volume:/home/node/.n8n:rw
    environment:
      - N8N_ENCRYPTION_KEY=clave_secreta_inasistencias_2026
      - N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS=false
      - TZ=America/Guatemala
      - WEBHOOK_URL=https://drew-catfight-obsession.ngrok-free.dev/

volumes:
  n8n_data_volume:
