<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Justificación de Inasistencias</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">

    <div class="bg-white p-8 rounded-lg shadow-md w-full max-w-md">
        <h2 class="text-2xl font-bold mb-6 text-gray-800 text-center">Justificación de Inasistencia</h2>
        
        <form id="formJustificacion" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700">Nombre Completo</label>
                <input type="text" id="nombre" name="nombre" required class="mt-1 w-full p-2 border border-gray-300 rounded-md focus:ring-blue-500 focus:border-blue-500">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700">ID / Carné de Estudiante</label>
                <input type="text" id="estudianteId" name="estudianteId" required class="mt-1 w-full p-2 border border-gray-300 rounded-md focus:ring-blue-500 focus:border-blue-500">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700">Correo Electrónico</label>
                <input type="email" id="correo" name="correo" required class="mt-1 w-full p-2 border border-gray-300 rounded-md focus:ring-blue-500 focus:border-blue-500">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700">Motivo de Inasistencia</label>
                <select id="motivo" name="motivo" required class="mt-1 w-full p-2 border border-gray-300 rounded-md focus:ring-blue-500 focus:border-blue-500">
                    <option value="">Selecciona una opción</option>
                    <option value="Médico">Médico / Salud</option>
                    <option value="Calamidad Doméstica">Calamidad Doméstica</option>
                    <option value="Trámite Legal">Trámite Legal</option>
                    <option value="Otro">Otro</option>
                </select>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700">Documento de Soporte (Imagen o PDF)</label>
                <input type="file" id="soporte" name="soporte" accept="image/*,.pdf" required class="mt-1 w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-md file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100">
            </div>

            <button type="submit" class="w-full bg-blue-600 text-white py-2 px-4 rounded-md font-semibold hover:bg-blue-700 transition duration-200">
                Enviar Solicitud
            </button>
        </form>
    </div>

    <script>
        const formulario = document.getElementById('formJustificacion');
        
        // ⚠️ REEMPLAZA ESTA URL CON TU TEST URL DE N8N COPIADA EN EL PASO ANTERIOR
        const N8N_WEBHOOK_URL = 'http://localhost:5678/webhook-test/justificacion-inasistencia';

        formulario.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // Usamos FormData porque vamos a enviar un archivo binario junto con textos
            const formData = new FormData(formulario);

            try {
                const response = await fetch(N8N_WEBHOOK_URL, {
                    method: 'POST',
                    body: formData
                });

                if (response.ok) {
                    alert('¡Solicitud enviada con éxito!');
                    formulario.reset();
                } else {
                    alert('Hubo un error al enviar la solicitud al servidor.');
                }
            } catch (error) {
                console.error('Error:', error);
                alert('No se pudo conectar con el servidor.');
            }
        });
    </script>
</body>
</html>
